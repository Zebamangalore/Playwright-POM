[pytest]
testpaths = tests
python_files = test_*.py
python_functions = test_*
addopts = -n 2 --dist=load

# Logging config
log_cli          = true
log_cli_level    = INFO
log_cli_format   = %(asctime)s [%(levelname)s] %(message)s
log_date_format  = %H:%M:%S

markers =
    smoke:      Fast critical path tests — run on every commit
    regression: Full regression suite — run before every release
    slow:       Tests that take a long time to execute